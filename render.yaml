services:
  - type: web
    name: mmotors-reference-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: http://localhost:5173
