services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/mmotors.db
      JWT_SECRET_KEY: local-docker-secret-change-me
      CORS_ORIGINS: http://localhost:5173
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

